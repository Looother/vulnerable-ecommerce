<VirtualHost *:80>
    ServerAdmin webmaster@localhost
    DocumentRoot /var/www/html/src

    # Enable directory listing for DocumentRoot
    <Directory /var/www/html/src>
        Options +Indexes +FollowSymLinks
        AllowOverride None
        Require all granted
    </Directory>

    # Disable directory index files to force directory listing
    DirectoryIndex disabled

    # Map /uploads to the writable directory outside the mounted src volume
    Alias /uploads /var/www/html/uploads
    <Directory /var/www/html/uploads>
        Options +Indexes +FollowSymLinks
        AllowOverride None
        Require all granted
    </Directory>

    # Reverse proxy settings to forward requests to the Node.js application
    ProxyRequests Off
    ProxyPreserveHost On

    # Exclude directories from proxying so Apache can perform directory listings
    ProxyPass /src !
    ProxyPass /uploads !
    ProxyPass /images !
    ProxyPass /.env !
    ProxyPass /config.json !

    # Proxy routes to the Node.js backend
    ProxyPass /admin http://127.0.0.1:3000/admin
    ProxyPassReverse /admin http://127.0.0.1:3000/admin

    ProxyPass /product http://127.0.0.1:3000/product
    ProxyPassReverse /product http://127.0.0.1:3000/product

    ProxyPass /checkout http://127.0.0.1:3000/checkout
    ProxyPassReverse /checkout http://127.0.0.1:3000/checkout

    ProxyPass / http://127.0.0.1:3000/
    ProxyPassReverse / http://127.0.0.1:3000/

    ErrorLog ${APACHE_LOG_DIR}/error.log
    CustomLog ${APACHE_LOG_DIR}/access.log combined
</VirtualHost>
